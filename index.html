<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script type="text/javascript">
        (function() {
            // 2. Inicialize com sua Public Key (User ID)
            emailjs.init({
              publicKey: "OT6tHHZiNEbHSuZai",
            });
        })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Betania+Patmos+GDL&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="EnviarEmail.js">
    <link rel="stylesheet" href="estilo.css">
    <title>Suporte Wilson</title>
</head>
<body>
    <h1>Wilson Suportes</h1>
    <form id="contact-form">
        <label for="nome">Nome:</label>
        <br>
        <input type="text" name="nome" class="campos">
        <br><br>

        <label for="email">Email:</label>
        <br>
        <input type="text" name="email" class="campos">
        <br><br>

        <label for="assunto">Assunto:</label>
        <br>
        <input type="text" name="assunto" class="campos">
        <br><br>

        <label for="menssagem">Posso ajudalo com o que:</label>
        <br>
        <textarea class="campos" name="menssagem" required></textarea>
        <br><br>

        <button type="submit" id="botao">Enviar</button>
    </form> 
</body>
</html>
